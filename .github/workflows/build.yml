name: Build NoorApp APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. توليد gradle-wrapper.jar ────────────────────────────────
      - name: Setup Gradle & regenerate wrapper JAR
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Regenerate gradle wrapper
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      # ── 4. Permission ───────────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── 5. Cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. حذف PNG المكررة ─────────────────────────────────────────
      - name: Remove duplicate PNG launcher icons
        run: |
          find app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete
          echo "Removed duplicate PNGs"

      # ── 7. فك تشفير الـ Keystore ───────────────────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "Keystore decoded successfully"

      # ── 8. Build Debug APK ──────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Build Release APK موقّع ─────────────────────────────────
      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      # ── 10. حذف الـ Keystore ────────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore

      # ── 11. إنشاء GitHub Release تلقائي ────────────────────────────
      - name: Get version name
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | sed 's/.*versionName "\(.*\)"/\1/' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "نور المؤمن ${{ steps.version.outputs.version }} — Build #${{ github.run_number }}"
          body: |
            ## تطبيق نور المؤمن 🕌
            
            **إهداء إلى روح محمد عبد العظيم الطويل رحمه الله**
            
            ### الميزات:
            - 🕌 مواقيت الصلاة بالموقع الجغرافي
            - 🧭 اتجاه القبلة
            - 📿 الأذكار الصوتية (10 أذكار)
            - 🎙️ الأذان بأصوات 10 قراء
            - 📖 الأذكار اليومية مع العداد
            - 📱 المسبحة الرقمية
            - 🏆 التحديات الإسلامية 30 يوم
            - 📖 القرآن الكريم
            
            ### ملفات التحميل:
            - **app-release.apk** — نسخة موقّعة جاهزة للتثبيت ✅
            - **app-debug.apk** — نسخة للاختبار
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
