name: Build NoorApp APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. توليد gradle-wrapper.jar ────────────────────────────────
      - name: Setup Gradle & regenerate wrapper JAR
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Regenerate gradle wrapper
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      # ── 4. Permission ───────────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── 5. Cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. فك تشفير الـ Keystore ───────────────────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "Keystore decoded successfully"

      # ── 7. Build Debug APK ──────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 8. Upload Debug APK ─────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NoorApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 9. Build Release APK (موقّع) ───────────────────────────────
      - name: Build Signed Release APK
        env:
          STORE_FILE: release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      # ── 10. Upload Signed Release APK ──────────────────────────────
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NoorApp-release-signed-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 11. حذف الـ Keystore من السيرفر ────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore
