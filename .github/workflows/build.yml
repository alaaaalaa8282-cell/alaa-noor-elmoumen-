name: Build NoorApp APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle & regenerate wrapper JAR
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Regenerate gradle wrapper
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Remove duplicate PNG launcher icons
        run: find app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0-build-${{ github.run_number }}"
          gh release create "$TAG" \
            "app/build/outputs/apk/release/app-release.apk#APK موقّع جاهز للتثبيت" \
            "app/build/outputs/apk/debug/app-debug.apk#APK للاختبار" \
            --title "نور المؤمن — Build #${{ github.run_number }}" \
            --notes "اهداء الى روح محمد عبد العظيم الطويل رحمه الله"
